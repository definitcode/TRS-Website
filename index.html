<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="TempleRS - The premier private server. Play online, join the community forums, and experience custom content.">
  <meta name="color-scheme" content="dark">

                <!-- Filled by JS -->
              </div>
            </div>

        </tr>
      </table>
    </div>
